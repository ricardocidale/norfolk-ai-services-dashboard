# Deploy to Vercel when you push to main — after one-time Vercel + GitHub setup.
#
# Add these GitHub repository secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN        — https://vercel.com/account/tokens
#   VERCEL_ORG_ID       — Project Settings → General (or .vercel/project.json after `vercel link`)
#   VERCEL_PROJECT_ID   — same
#
# Set DATABASE_URL and other app env vars in the Vercel project (or pull them into the build).
# GitHub Secrets (OPENAI_API_KEY, etc.) are not passed to Vercel unless you mirror them there.

name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --yes --token "${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
